name: Tests PHPUnit

on: # déclenchement du workflow
  push:
    branches:
      - main
      - develop
  pull_request:
    branches:
      - main
      - develop
  workflow_dispatch:  # démarrage manuel depuis GitHub en ajoutant un bouton

jobs: # les étapes sont exécutées sur une machine virtuelle
  tests:

    #nom affiché sur GitHub Actions
    name: Tests unitaires (Java ${{ matrix.java-version }})
    runs-on: ubuntu-latest # => plus proche d'une serveur Linux (autres: Mac Windows)

    strategy:
      matrix:
        java-version: ['23'] # vérification sur plusieurs versions
      fail-fast: false  # continue les autres versions si l'une échoue

    steps: # exécuter dans l'ordre
      - name: Récupérer le code
        uses: actions/checkout@v4

      - name: Installer Java ${{ matrix.java-version }}
        uses: actions/setup-java@v4
        with:
          java-version: ${{ matrix.java-version }}
          distribution: 'temurin'  # distribution OpenJDK (anciennement AdoptOpenJDK)

      - name: Vérifier les versions
        run: |
          java --version
          mvn --version

      - name: Mettre en cache les dépendances Maven

        # mvn install => download packages et les mets dans ~/.m2
        # utilisé si pom.xml ne change pas, pas de nouvelles dépendances
        # sinon le cache est régénéré
        uses: actions/cache@v4
        with:
          path: ~/.m2/repository
          key: maven-${{ matrix.java-version }}-${{ hashFiles('**/pom.xml') }}
          restore-keys: |
            maven-${{ matrix.java-version }}-

      - name: Installer les dépendances
        run: mvn install -DskipTests --no-transfer-progress

      - name: Lancer les tests
        run: mvn test --no-transfer-progress
        env:
          # JavaFX headless — nécessaire sur Ubuntu (pas d'écran)
          DISPLAY: ':99'
          _JAVA_OPTIONS: >-
            -Dtestfx.robot=glass
            -Dtestfx.headless=true
            -Dprism.order=sw
            -Dprism.verbose=false
            -Djava.awt.headless=true
            -Dnet.bytebuddy.experimental=true